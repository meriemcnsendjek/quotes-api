services:
  app:
    build: .
    container_name: quotes_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./.env:/var/www/.env
    networks:
      - quotes_network

  nginx:
    image: nginx:alpine
    container_name: quotes_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - quotes_network

  db:
    image: mysql:8.0
    container_name: quotes_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: quotes_api
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - quotes_network

networks:
  quotes_network:
    driver: bridge

volumes:
  dbdata: